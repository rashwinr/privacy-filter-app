[pytest]
testpaths = tests
addopts = -ra --strict-markers --tb=short
markers =
    slow: tests that download model weights or otherwise take >5s (deselect with '-m "not slow"')
    requires_model: tests that need the real openai/privacy-filter checkpoint
    requires_tesseract: tests that need the Tesseract binary on PATH
    requires_pymupdf: tests that need PyMuPDF (fitz) installed
filterwarnings =
    ignore::DeprecationWarning
