# Cloud Build: build + push + deploy privacy-filter to Cloud Run
# Uses GCS backend (tanuh-bcd-bucket/privacy-app) with Secret Manager for credentials.

substitutions:
  _REGION: "asia-south1"
  _SERVICE: "privacy-filter"
  _BUCKET: "tanuh-bcd-bucket"
  _GCS_PREFIX: "privacy-app"
  _GCS_SECRET: "privacy-filter-gcs-sa"
  _DICOM_ROWS: "100"
  _TAG: "latest"

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

images:
  - "gcr.io/$PROJECT_ID/${_SERVICE}:${_TAG}"

steps:
  # ── Step 1: Build Docker image ──────────────────────────────────────────────
  - id: "build"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/${_SERVICE}:${_TAG}"
      - "-t"
      - "gcr.io/$PROJECT_ID/${_SERVICE}:latest"
      - "."

  # ── Step 2: Push image to Container Registry ────────────────────────────────
  - id: "push"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "gcr.io/$PROJECT_ID/${_SERVICE}"

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - id: "deploy"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud run deploy ${_SERVICE} \
          --image gcr.io/$PROJECT_ID/${_SERVICE}:${_TAG} \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --memory 4Gi \
          --cpu 2 \
          --concurrency 4 \
          --timeout 300 \
          --min-instances 0 \
          --max-instances 5 \
          --set-env-vars "MODEL_NAME=openai/privacy-filter,MODEL_DEVICE=cpu,STORAGE_BACKEND=gcs,GCS_BUCKET=${_BUCKET},GCS_PREFIX=${_GCS_PREFIX},DICOM_PIXEL_REDACT_ROWS=${_DICOM_ROWS},LOG_LEVEL=INFO" \
          --set-secrets "GCS_CREDENTIALS_JSON=${_GCS_SECRET}:latest"

# ── HOW TO USE ─────────────────────────────────────────────────────────────────
#
# One-time setup (already done if secret exists):
#
#   gcloud secrets create privacy-filter-gcs-sa \
#     --data-file=gcs-service-account.json \
#     --project=tanuh-bcd-questionnaire
#
#   To update an existing secret version:
#   gcloud secrets versions add privacy-filter-gcs-sa \
#     --data-file=gcs-service-account.json \
#     --project=tanuh-bcd-questionnaire
#
#   Grant Cloud Build SA (project 147901050545) access:
#   gcloud secrets add-iam-policy-binding privacy-filter-gcs-sa \
#     --member="serviceAccount:147901050545@cloudbuild.gserviceaccount.com" \
#     --role="roles/secretmanager.secretAccessor" \
#     --project=tanuh-bcd-questionnaire
#
# Submit the build:
#
#   gcloud builds submit --config cloudbuild.yaml \
#     --project=tanuh-bcd-questionnaire
#
# Files will be written to:
#   gs://tanuh-bcd-bucket/privacy-app/uploads/
#   gs://tanuh-bcd-bucket/privacy-app/redacted/
