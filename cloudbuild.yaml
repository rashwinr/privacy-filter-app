# Cloud Build: build + push + deploy privacy-filter to Cloud Run
# Uses Artifact Registry + GCS backend (tanuh-bcd-bucket/privacy-app) + Secret Manager.

substitutions:
  _REGION: "asia-south1"
  _SERVICE: "privacy-filter"
  _AR_REPO: "cloud-run-source-deploy"
  _BUCKET: "tanuh-bcd-bucket"
  _GCS_PREFIX: "privacy-app"
  _GCS_SECRET: "privacy-filter-gcs-sa"
  _DICOM_ROWS: "100"
  _TAG: "latest"

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:${_TAG}"

steps:
  # ── Step 1: Build Docker image ──────────────────────────────────────────────
  - id: "build"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:${_TAG}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest"
      - "."

  # ── Step 2: Push image to Artifact Registry ─────────────────────────────────
  - id: "push"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}"

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - id: "deploy"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud run deploy ${_SERVICE} \
          --image ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:${_TAG} \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --memory 8Gi \
          --cpu 4 \
          --concurrency 4 \
          --timeout 600 \
          --min-instances 0 \
          --max-instances 5 \
          --cpu-boost \
          --set-env-vars "MODEL_NAME=openai/privacy-filter,MODEL_DEVICE=cpu,STORAGE_BACKEND=gcs,GCS_BUCKET=${_BUCKET},GCS_PREFIX=${_GCS_PREFIX},DICOM_PIXEL_REDACT_ROWS=${_DICOM_ROWS},LOG_LEVEL=INFO" \
          --set-secrets "GCS_CREDENTIALS_JSON=${_GCS_SECRET}:latest"

# ── HOW TO USE ─────────────────────────────────────────────────────────────────
#
# Submit the build:
#
#   gcloud builds submit --config cloudbuild.yaml \
#     --project=tanuh-bcd-questionnaire
#
# Image will be pushed to:
#   asia-south1-docker.pkg.dev/tanuh-bcd-questionnaire/cloud-run-source-deploy/privacy-filter:latest
#
# Files will be written to:
#   gs://tanuh-bcd-bucket/privacy-app/uploads/
#   gs://tanuh-bcd-bucket/privacy-app/redacted/
